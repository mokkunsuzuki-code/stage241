name: slsa-governed-build

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source bundle artifact
        run: |
          chmod +x tools/build_stage239_artifact.sh
          ./tools/build_stage239_artifact.sh

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SPDX SBOM
        run: |
          mkdir -p out/policy
          syft "file:stage239-source-bundle.tar.gz" -o spdx-json=out/policy/stage239-source-bundle.spdx.json
          test -f out/policy/stage239-source-bundle.spdx.json

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: stage239-source-bundle
          path: stage239-source-bundle.tar.gz

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: stage239-source-bundle-sbom
          path: out/policy/stage239-source-bundle.spdx.json

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: stage239-source-bundle.tar.gz

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: stage239-source-bundle.tar.gz
          sbom-path: out/policy/stage239-source-bundle.spdx.json
